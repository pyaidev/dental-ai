name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2 libffi-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx bcrypt 'python-jose[cryptography]' 'qrcode[pil]' python-docx markdown redis

      - name: Create dirs
        run: mkdir -p data uploads results

      - name: Run tests
        run: pytest tests/test_auth.py tests/test_indices.py tests/test_plaque_detector.py tests/test_recommendations.py tests/test_product_matrix.py tests/test_detect_preview.py tests/test_auth_register.py tests/test_subscriptions.py -v --tb=short
        env:
          DATABASE_URL: sqlite:///./data/test.db
          SECRET_KEY: test-secret-key-ci

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend-next
        run: npm install

      - name: Build
        working-directory: frontend-next
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
